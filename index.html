<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burak Pro-Engine | AI Search</title>
    
    <style>
        :root {
            --google-gray: #f8f9fa;
            --edge-blue: #0078d4;
            --text-dark: #202124;
            --border-color: #dfe1e5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header / Navigasyon */
        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background-color: #fff;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--edge-blue);
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Ana Arama Alanı (Google Tarzı Center) */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .big-logo {
            font-size: 60px;
            font-weight: bold;
            color: var(--edge-blue);
            margin-bottom: 30px;
        }

        .search-box-wrapper {
            position: relative;
            width: 100%;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            padding-right: 120px; /* Butonlar için alan */
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-box:hover, .search-box:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .search-buttons {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-google {
            background-color: var(--google-gray);
            color: #3c4043;
        }

        .btn-google:hover { background-color: #e8eaed; }

        .btn-ai {
            background-color: var(--edge-blue);
            color: #fff;
        }

        .btn-ai:hover { background-color: #005a9e; }

        /* Sonuç Alanı */
        #results-area {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            display: none; /* Başlangıçta gizli */
            padding-bottom: 50px;
        }

        .result-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .ai-response {
            border-left: 4px solid var(--edge-blue);
            background-color: #f0f8ff;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--edge-blue);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body onload="initEngine()">

<header>
    <a href="#" class="logo">Burak Pro-X</a>
    <div class="header-actions">
        <span>Görseller</span>
        <button class="btn btn-ai" style="border-radius:50%; width:40px; height:40px; padding:0;">B</button>
    </div>
</header>

<main>
    <div class="search-container" id="search-home">
        <div class="big-logo">Burak</div>
        <div class="search-box-wrapper">
            <input type="text" id="query" class="search-box" placeholder="Arayın veya C++ modüllerini tetikleyin (xq://)..." onkeypress="handleKey(event)">
            <div class="search-buttons">
                <button class="btn btn-google" onclick="googleSearch()">Google</button>
                <button class="btn btn-ai" onclick="aiSearch()">AI Modu</button>
            </div>
        </div>
    </div>

    <div id="results-area">
        <div class="loader" id="loader"></div>
        <div id="ai-content"></div>
        <div id="file-root-content"></div>
    </div>
</main>

<script>
    // ÖNEMLİ: Kendi API Anahtarını buraya yapıştır!
    const DEEPSEEK_API_KEY = "YOUR_DEEPSEEK_API_KEY"; 

    function initEngine() {
        console.log("Burak Pro-Engine Aktif.");
        console.log("Core: https_help_file_root.cpp & pagesalign.cpp yüklendi.");
    }

    // 1. Google Arama (Gerçek Google URL'sini kullanır)
    function googleSearch() {
        const query = document.getElementById('query').value;
        if (!query) return;
        // Gerçek Google arama sayfasına yönlendirir
        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }

    // 2. AI Arama Modu (DeepSeek API Entegrasyonu)
    async function aiSearch() {
        const query = document.getElementById('query').value;
        const resultsArea = document.getElementById('results-area');
        const aiContent = document.getElementById('ai-content');
        const loader = document.getElementById('loader');

        if (!query) return;

        // Arayüzü Hazırla
        document.getElementById('search-home').style.paddingTop = "20px"; // Yukarı kaydır
        resultsArea.style.display = "block";
        aiContent.innerHTML = "";
        loader.style.display = "block";

        try {
            // Gerçek API İsteği (CORS Engeline takılabilir, gerçek projede C# arka ucu üzerinden yapmalısın)
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        {"role": "system", "content": "Sen Burak'ın özel Pro-Engine yapay zeka asistanısın."},
                        {"role": "user", "content": query}
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            // Yapay Zeka Yanıtını Yazdır
            aiContent.innerHTML = `
                <div class="result-card ai-response">
                    <h3 style="color:var(--edge-blue); margin-top:0;">Burak AI Yanıtı</h3>
                    <p style="white-space: pre-wrap;">${aiText}</p>
                    <small style="color:gray;">Model: DeepSeek-V1 | API: Bağlı</small>
                </div>
            `;

            // Özel Protokol Kontrolü (C++ modüllerini simüle et)
            if (query.startsWith('xq://')) {
                document.getElementById('file-root-content').innerHTML = `
                    <div class="result-card">
                        <h4>[C++ Core] xq:// Protokolü Tetiklendi</h4>
                        <p>pagesalign.cpp: Bellek adresleri hizalanıyor...<br>
                        https_help_file_root.cpp: Ham veri çekirdeği aktif.</p>
                    </div>
                `;
            } else {
                document.getElementById('file-root-content').innerHTML = "";
            }

        } catch (error) {
            aiContent.innerHTML = `
                <div class="result-card" style="border-left: 4px solid red;">
                    <h3 style="color:red; margin-top:0;">API Bağlantı Hatası</h3>
                    <p>Yapay zeka modülüne şu an ulaşılamıyor. Tarayıcı CORS engeli veya hatalı API anahtarı.<br>
                    Lütfen C# (main.cs) arka ucunu kontrol et veya API anahtarını index.html'e yapıştır.</p>
                </div>
            `;
        } finally {
            loader.style.display = "none";
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter') {
            // Varsayılan olarak AI araması yap
            aiSearch();
        }
    }
</script>

</body>
</html>
