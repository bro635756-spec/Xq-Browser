<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Burak AI Search Engine - Multi-Protocol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 class="glitch-text">PRO-X ENGINE</h1>
            <div class="search-bar">
                <input type="text" id="addressInput" placeholder="URL girin (https://, xq://, help://)...">
                <button onclick="Engine.process()">GİT</button>
            </div>
        </header>

        <main id="viewport">
            <div id="status">Sistem Hazır.</div>
            <div id="content-display"></div>
        </main>
    </div>

    <script>
        const Engine = {
            async process() {
                const url = document.getElementById('addressInput').value;
                const display = document.getElementById('content-display');
                const status = document.getElementById('status');
                
                status.innerText = `Bağlanılıyor: ${url}`;
                display.innerHTML = "";

                try {
                    if (url.startsWith('https://')) {
                        // Gerçek internet verisi çekme (CORS izinli API'ler için)
                        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                        const data = await response.json();
                        display.innerText = data.contents;
                    } 
                    else if (url.startsWith('xq://')) {
                        // Özel XQ Protokolü İşleme
                        display.innerHTML = `<div class='xq-box'>XQ Protokolü Devrede: Veri Şifreleniyor...</div>`;
                    }
                    else if (url.startsWith('help://burakhelpssq.xqom')) {
                        // Burak Özel Yardım Sayfası
                        display.innerHTML = "<h2>Burak Help Center</h2><p>Yapay zeka ve OS yönetim paneline hoş geldiniz.</p>";
                    }
                    else if (url.startsWith('file://')) {
                        display.innerText = "Güvenlik nedeniyle yerel dosyalara sadece OS katmanından erişilebilir.";
                    }
                } catch (err) {
                    status.innerText = "Hata: Veri çekilemedi.";
                }
            }
        };
    </script>
</body>
</html>
